name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        scala:
          - 2.13.16
          - 3.3.4

    steps:
      - uses: actions/checkout@v2

      - uses: coursier/cache-action@v6

      - name: setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
          cache: 'sbt'

      - name: setup SBT
        uses: sbt/setup-sbt@v1

#      - name: check ${{ matrix.scala }}
#        run: sbt ++${{ matrix.scala }} clean check

      - name: build ${{ matrix.scala }}
        run: sbt ++${{ matrix.scala }} clean test